<!doctype html>
<html lang="en">

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"

          <div class="stat-card">

            <div class="stat-value" id="total-groups">0</div>
          </div>
        </div>

        <div class="cur-add-word">10 từ mới nhất</div>
        <div class="cur-add-word-list" id="cur-list"></div>
      </div>
    </div>
    <script src="../assets/script/auth.js"></script>
